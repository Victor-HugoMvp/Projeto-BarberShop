<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barber Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel = "stylesheet" href="css/listaAgendamentos.css">
</head>

<body>

<!-- Header com icone e titulo barbershop -->
<header>
  <img src="images/corte-de-barba.png" alt="Logo" />
  <h1>Barber Shop</h1>
</header>

<!-- Container com subtitulo e segundo icone -->
<div class="container">

    <div class="titulo-secao">
        <img src="images/corte-de-barba.png" width="60" />
        <div class="texto-boas-vindas">
        <p class="paragrafoApresent">
        Seja bem-vindo ao serviço de agendamento da</p>
        <h3 class="titleBarber">Barber Shop</h3> 
        </div>
    </div>

    <h3 class = "titulo-tabela"> Lista de Agendamentos</h3>
    
    <div class = "tabela-geral">
        <table class = "tabela-apontamento">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Data e Hora</th>
                    <th>Serviço</th>
                    <th>Barbeiro</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id = "tabela-agendamentos">

            </tbody>
        </table>    
    </div>
</div>
    


</body>
    <script src="script/listaAgendamentos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</html>
